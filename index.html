<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TensioBot - Salud Cardiovascular</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens in some sandboxed environments when libraries try to polyfill fetch.
      (function() {
        try {
          const f = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return f; },
            set: function(v) { console.warn('Something tried to override fetch'); }
          });
        } catch (e) {
          console.error('Fetch fix error:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
